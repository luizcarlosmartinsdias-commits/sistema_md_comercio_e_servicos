name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [codex/issue-1-mvp, main]

jobs:
  build:
    name: Build and typecheck
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: md_test
          POSTGRES_PASSWORD: md_test
          POSTGRES_DB: md_portal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U md_test -d md_portal_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://md_test:md_test@localhost:5432/md_portal_test?schema=public
      NEXTAUTH_SECRET: ci-nextauth-secret
      APP_URL: http://localhost:3000
      EMAIL_PROVIDER: mock
      WHATSAPP_PROVIDER: mock
      STORAGE_PROVIDER: local
      STORAGE_LOCAL_PATH: ./uploads
      MD_NOTIFICATION_EMAIL: ci-md@example.com
      MD_WHATSAPP_NUMBER: '5500000000000'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
